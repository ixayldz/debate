name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  integration:
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: debate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d debate_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      RUN_MIGRATIONS: 'true'
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/debate_test
      TEST_REDIS_HOST: 127.0.0.1
      TEST_REDIS_PORT: 6379
      TEST_REDIS_PREFIX: ci:${{ github.run_id }}:${{ github.run_attempt }}
      LIVEKIT_REQUIRED: 'false'
      EMAIL_REQUIRED: 'false'
      HEALTHCHECK_STRICT_EXTERNALS: 'false'
      JWT_SECRET: ci-jwt-secret-change-this
      JWT_REFRESH_SECRET: ci-refresh-secret-change-this

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Integration tests (real DB/Redis)
        run: npm run test:integration
